apiVersion: apps/v1
kind: Deployment
metadata:
  name: wil42-playground
spec:
  replicas: 3
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: wil42-playground
  template:
    metadata:
      labels:
        app: wil42-playground
    spec:
      containers:
        - image: nginxdemos/hello:0.4
          name: wil42-playground
          ports:
            - containerPort: 80