apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gitlab-app
  namespace: dev
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /gitlab
            pathType: Prefix
            backend:
              service:
                name: gitlab-app
                port:
                  number: 80