apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gitlab-app
  namespace: gitlab
spec:
  ingressClassName: traefik
  rules:
  - host: gitlab-ui.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gitlab-app
            port:
              number: 80